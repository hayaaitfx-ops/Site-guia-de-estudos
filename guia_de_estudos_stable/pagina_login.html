<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Estudos - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accessibility-controls">
        <button id="fontSizeBtn" class="font-size-btn" title="Aumentar/Diminuir Fonte">
            <span class="magnifying-glass">🔍</span>
            <span class="font-label">A</span>
        </button>
    </div>

    <div class="background-decoration">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="floating-shape shape-4"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1>📚 Guia de Estudos</h1>
                <p>Seu caminho para o sucesso acadêmico</p>
            </div>
            
            <form id="loginForm" class="login-form">
                
                <div id="registerExtraFields" style="display: none; margin-bottom: 15px;">
                    <div class="form-group">
                        <label for="regNome">Nome Completo</label>
                        <input type="text" id="regNome" placeholder="Seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="regIdade">Idade</label>
                        <input type="number" id="regIdade" placeholder="Ex: 21">
                    </div>
                    <div class="form-group">
                        <label for="regArea">Área de Estudo / Profissão</label>
                        <input type="text" id="regArea" placeholder="Ex: Engenharia de Software">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite sua senha"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-meter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <p id="strengthText" class="strength-text">Digite uma senha</p>
                    </div>
                    <div class="password-requirements">
                        <p class="requirement-title">Requisitos de senha forte:</p>
                        <ul>
                            <li id="req-length">✗ Mínimo 8 caracteres</li>
                            <li id="req-uppercase">✗ Letra maiúscula</li>
                            <li id="req-lowercase">✗ Letra minúscula</li>
                            <li id="req-number">✗ Número</li>
                            <li id="req-special">✗ Caractere especial (!@#$%^&*)</li>
                        </ul>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Entrar</button>
            </form>
            <button id="btnGuestPreview" class="free-btn" style="width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; color: #1f2937; background: #f9fafb; border: 2px solid #e5e7eb;">
                ✨ Entrar como Convidado (Preview Rápido)
            </button>

            <div class="login-footer">
                <a href="#" id="toggleAuthModeLink">Criar conta</a>
                <a href="plano_assinatura.html" class="view-plans-link">Ver planos de assinatura →</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
